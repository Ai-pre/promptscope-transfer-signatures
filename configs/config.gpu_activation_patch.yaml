model_name: Qwen/Qwen2.5-7B-Instruct
torch_dtype: float16
device_map: auto
seed: 42

tasks:
  seen:
    - gsm8k
    - csqa
  unseen:
    - svamp
    - boolq

batch_size: 1
max_new_tokens: 96
limit_per_task: 100
limit_prompts: null

layers:
  - 4
  - 12
  - -1

positions:
  - system_last_token
  - first_user_token

base_prompt: "You are a helpful assistant."

paths:
  prompts: data/prompts_principle_boundary.jsonl
  datasets_dir: data/datasets
  outputs_dir: outputs/gpu_activation_patch

analysis:
  ridge_alpha: 1.0
  logistic_c: 1.0
  n_splits: 5
  top_k: 5
  random_trials: 500

patching:
  donor_prompt_id: principle3_concise_careful_format
  target_prompt_id: principle3_plain
  task_split: unseen
  limit_per_task: 25
  layers:
    - 4
    - 12
    - -1
  positions:
    - first_user_token
  alphas:
    - 0.5
    - 1.0
