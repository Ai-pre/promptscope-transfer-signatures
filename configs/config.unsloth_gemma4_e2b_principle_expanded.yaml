model_name: unsloth/gemma-4-E2B-it
torch_dtype: float16
device_map: auto
seed: 42

tasks:
  seen:
    - gsm8k
    - csqa
    - bbh
    - mmlu_pro
  unseen:
    - svamp
    - boolq
    - bbeh_mini
    - gpqa

batch_size: 1
max_new_tokens: 96
limit_per_task: 100
limit_prompts: null

layers:
  - 4
  - 12
  - -1

positions:
  - system_last_token
  - first_user_token

base_prompt: "You are a helpful assistant."

paths:
  prompts: data/prompts_principle_boundary.jsonl
  datasets_dir: data/datasets
  outputs_dir: outputs/unsloth_gemma4_e2b_principle_expanded

analysis:
  ridge_alpha: 1.0
  logistic_c: 1.0
  n_splits: 5
  top_k: 5
  random_trials: 500

